version: '3.8'

services:
  sporx-backend:
    build: .
    ports:
      - "5173:5173"
      - "3001:3001"
    volumes:
      - ./src:/app/src
      - ./server:/app/server
      - ./package.json:/app/package.json
    environment:
      - NODE_ENV=development
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=sporx_db
      - DB_USERNAME=root
      - DB_PASSWORD=root54
    depends_on:
      - mariadb
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./server
          target: /app/server
        - action: rebuild
          path: package.json

  mariadb:
    image: bitnami/mariadb:latest
    environment:
      - MARIADB_ROOT_PASSWORD=root54
      - MARIADB_DATABASE=sporx_db
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/bitnami/mariadb/data

volumes:
  mariadb_data:
